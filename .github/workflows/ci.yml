name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check-types
      - run: npm test
      - run: npm run compile
      - run: npx @vscode/vsce package --allow-missing-repository -o /tmp/agentage.vsix
